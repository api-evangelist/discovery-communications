description: >-
  Discovery Communications was a global media company providing original and purchased
  programming across multiple distribution platforms before merging with WarnerMedia
  in 2022 to form Warner Bros. Discovery (WBD), a leading global media and entertainment
  company whose portfolio spans HBO Max, Discovery Channel, CNN, Warner Bros. film
  studios, DC, Food Network, HGTV, and other television, film, and streaming brands.
  No public developer APIs are documented at the corporate level; technical and
  partnership inquiries are handled at the individual brand or business-unit level.
